services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ifnbl
      POSTGRES_USER: ifnbl
      POSTGRES_PASSWORD: ifnbl_local_password
    ports:
      - "5432:5432"
    volumes:
      - ifnbl_postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ifnbl -d ifnbl"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://ifnbl:ifnbl_local_password@db:5432/ifnbl
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me-before-sharing
      JWT_SECRET: local-development-only-change-me
      JWT_EXPIRES_IN: 12h
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      # The importer reads the checked-in season JSON from /frontend.
      - ./frontend:/frontend:ro
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      HOST: 0.0.0.0
      WDS_SOCKET_PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_BASE_URL: http://localhost:4000
      DEV_PROXY_TARGET: http://backend:4000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  db-sync:
    # Production runs PostgreSQL 18; pg_dump must be the same major version
    # or newer than the server it reads from.
    image: postgres:18-alpine
    profiles: ["tools"]
    environment:
      LOCAL_DATABASE_URL: postgresql://ifnbl:ifnbl_local_password@db:5432/ifnbl
      PRODUCTION_DATABASE_URL: ${PRODUCTION_DATABASE_URL:-}
    volumes:
      - ./docker/sync-production-db.sh:/usr/local/bin/sync-production-db:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/sync-production-db"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  ifnbl_postgres_data:
  backend_node_modules:
  frontend_node_modules:
